# This workflow builds release artifacts in parallel and performs the final upload once.

name: Push To ClickOnce

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-release-${{ github.ref }}
  cancel-in-progress: false

env:
  B2_CLI_VERSION: '4.6.0'
  LEGACY_BRIDGE_VERSION: '2026.04.23.553'
  LEGACY_BRIDGE_MARKER: 'legacy-clickonce-bridge-version.txt'
  MODER_UPDATE_COMMIT: 'd547c9905d0cb706aa163e418ab5ef424a14dc9c'

jobs:
  prepare:
    runs-on: windows-latest
    outputs:
      build-version: ${{ steps.versioning.outputs.build-version }}
      release-tag: ${{ steps.versioning.outputs.release-tag }}
      publish-bridge: ${{ steps.bridge-check.outputs.publish-bridge }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Compute release versions
      id: versioning
      shell: pwsh
      env:
        BUILD_NUMBER: ${{ github.run_number }}
      run: |
        $buildVersion = Get-Date -Format "yyyy.MM.dd.$env:BUILD_NUMBER"
        $releaseTag = "v$buildVersion"
        "build-version=$buildVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "release-tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    - name: Check legacy bridge presence
      id: bridge-check
      shell: pwsh
      env:
        B2_BUCKET: ${{ secrets.B2_BUCKET }}
        B2_APPKEY_ID: ${{ secrets.B2_APPKEY_ID }}
        B2_APPKEY: ${{ secrets.B2_APPKEY }}
      run: |
        pip install --quiet --cache-dir C:\pip-cache "b2==$env:B2_CLI_VERSION"
        b2 account authorize $env:B2_APPKEY_ID $env:B2_APPKEY --quiet
        if ($LASTEXITCODE -ne 0) {
          throw "b2 account authorize failed with exit code $LASTEXITCODE."
        }
        $markerPath = "TelegramSearchBot/$env:LEGACY_BRIDGE_MARKER"
        $existingMarker = b2 ls --recursive "b2://$env:B2_BUCKET/$markerPath"
        if ($LASTEXITCODE -ne 0) {
          throw "b2 ls failed while checking bridge marker with exit code $LASTEXITCODE."
        }
        if ([string]::IsNullOrWhiteSpace($existingMarker)) {
          "publish-bridge=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } else {
          "publish-bridge=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }
        b2 account clear

  validate:
    needs: prepare
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Clear NuGet cache
      run: dotnet nuget locals all --clear
    - name: Restore dependencies
      run: dotnet restore --force --no-cache /p:BuildWithNetFrameworkHostedCompiler=true
    - name: Build
      run: dotnet build --no-restore -c Release
    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

  build-telegram-bot-api:
    needs: prepare
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Get telegram-bot-api commit hash
      id: tg-commit
      shell: pwsh
      run: |
        $hash = git ls-remote https://github.com/tdlib/telegram-bot-api.git HEAD | ForEach-Object { $_.Split("`t")[0] }
        Write-Output "TG_COMMIT_HASH=$hash" | Tee-Object -FilePath $env:GITHUB_OUTPUT -Append
        Write-Output "tg-commit-hash=$hash"
    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: C:\vcpkg
        key: vcpkg-x64-windows-static-v3-${{ runner.os }}
        restore-keys: |
          vcpkg-x64-windows-static-v3-
    - name: Install vcpkg
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
    - name: Cache telegram-bot-api build
      id: cache-tg-bot-api
      uses: actions/cache@v4
      with:
        path: |
          telegram-bot-api
          telegram-bot-api-bin
        key: tg-bot-api-win-x64-${{ steps.tg-commit.outputs.tg-commit-hash }}
        restore-keys: |
          tg-bot-api-win-x64-
    - name: Install gperf
      if: steps.cache-tg-bot-api.outputs.cache-hit != 'true'
      shell: pwsh
      run: choco install gperf -y
    - name: Build telegram-bot-api from source
      if: steps.cache-tg-bot-api.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        if (!(Test-Path "telegram-bot-api")) {
          git clone --recursive https://github.com/tdlib/telegram-bot-api.git
        }
        C:\vcpkg\vcpkg.exe install openssl:x64-windows-static zlib:x64-windows-static --no-print-usage
        Push-Location telegram-bot-api
        New-Item -ItemType Directory -Force build | Out-Null
        Push-Location build
        cmake -A x64 -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET="x64-windows-static" `
          ..
        cmake --build . --config Release --target telegram-bot-api
        Pop-Location
        Pop-Location
        New-Item -ItemType Directory -Force telegram-bot-api-bin | Out-Null
        Copy-Item "telegram-bot-api\build\Release\telegram-bot-api.exe" "telegram-bot-api-bin\telegram-bot-api.exe"
    - name: Upload telegram-bot-api artifact
      uses: actions/upload-artifact@v4
      with:
        name: telegram-bot-api-bin
        path: telegram-bot-api-bin\telegram-bot-api.exe
        if-no-files-found: error

  build-moder-update-updater:
    needs: prepare
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Build Moder.Update updater
      shell: pwsh
      run: |
        if (Test-Path moder-update) {
          Remove-Item moder-update -Recurse -Force
        }
        git clone https://github.com/ModerRAS/Moder.Update.git moder-update
        git -C moder-update checkout $env:MODER_UPDATE_COMMIT
        cargo build --manifest-path moder-update/src/updater/Cargo.toml --release
    - name: Upload Moder.Update updater artifact
      uses: actions/upload-artifact@v4
      with:
        name: moder-update-updater
        path: moder-update\src\updater\target\release\moder_update_updater.exe
        if-no-files-found: error

  build-standalone-assets:
    needs:
    - prepare
    - build-telegram-bot-api
    - build-moder-update-updater
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Download telegram-bot-api artifact
      uses: actions/download-artifact@v4
      with:
        name: telegram-bot-api-bin
        path: telegram-bot-api-bin
    - name: Download Moder.Update updater artifact
      uses: actions/download-artifact@v4
      with:
        name: moder-update-updater
        path: moder-update-bin
    - name: Copy external build artifacts
      shell: pwsh
      run: |
        Copy-Item "telegram-bot-api-bin\telegram-bot-api.exe" "TelegramSearchBot\telegram-bot-api.exe" -Force
    - name: Clear NuGet cache
      run: dotnet nuget locals all --clear
    - name: Restore dependencies
      run: dotnet restore --force --no-cache /p:BuildWithNetFrameworkHostedCompiler=true
    - name: Build
      run: dotnet build --no-restore -c Release
    - name: Publish standalone app
      shell: pwsh
      env:
        BUILD_VERSION: ${{ needs.prepare.outputs.build-version }}
      run: |
        if (Test-Path artifacts) {
          Remove-Item artifacts -Recurse -Force
        }
        dotnet publish .\TelegramSearchBot\TelegramSearchBot.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          --no-restore `
          /p:Version=$env:BUILD_VERSION `
          /p:PublishSingleFile=false `
          -o .\artifacts\standalone
    - name: Fetch existing update catalog from B2
      shell: pwsh
      env:
        B2_BUCKET: ${{ secrets.B2_BUCKET }}
        B2_APPKEY_ID: ${{ secrets.B2_APPKEY_ID }}
        B2_APPKEY: ${{ secrets.B2_APPKEY }}
      run: |
        if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
          Write-Host "Python not available, skipping catalog fetch."
          exit 0
        }
        pip install --quiet --cache-dir C:\pip-cache "b2==$env:B2_CLI_VERSION"
        b2 account authorize $env:B2_APPKEY_ID $env:B2_APPKEY --quiet
        if ($LASTEXITCODE -ne 0) {
          Write-Host "B2 auth failed, will create fresh catalog."
          exit 0
        }
        try {
          b2 download-file-by-name $env:B2_BUCKET TelegramSearchBot/catalog.json .\artifacts\existing-catalog.json --quiet
          Write-Host "Downloaded existing catalog.json for merge."
        } catch {
          Write-Host "No existing catalog found on B2, will create fresh catalog."
        }
        b2 account clear
    - name: Fetch previous release standalone for step package comparison
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $prevRelease = gh release list --repo ${{ github.repository }} --limit 1 --exclude-drafts --json tagName,name | ConvertFrom-Json
        if ($prevRelease.Count -gt 0) {
          $prevTag = $prevRelease[0].tagName
          $prevVersion = $prevTag -replace '^v', ''
          Write-Host "Previous release: $prevTag (version: $prevVersion)"
          $prevArchive = ".\artifacts\prev-standalone.zip"
          gh release download $prevTag --repo ${{ github.repository }} --pattern "TelegramSearchBot-win-x64-full-*.zip" --dir artifacts\prev-release
          $zipFile = Get-ChildItem artifacts\prev-release -Filter "TelegramSearchBot-win-x64-full-*.zip" | Select-Object -First 1
          if ($zipFile) {
            Expand-Archive -Path $zipFile.FullName -DestinationPath .\artifacts\prev-standalone -Force
            Write-Host "PREV_VERSION=$prevVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "PREV_STANDALONE_DIR=artifacts\prev-standalone" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Extracted previous standalone from $($zipFile.Name)."
          } else {
            Write-Host "No previous full zip found; step package will not be generated."
          }
        } else {
          Write-Host "No previous release found; this is the first release."
        }
    - name: Build Moder.Update feed
      shell: pwsh
      env:
        BUILD_VERSION: ${{ needs.prepare.outputs.build-version }}
      run: |
        $builderArgs = @(
          '--source-dir', '.\artifacts\standalone',
          '--output-dir', '.\artifacts\update-feed',
          '--target-version', $env:BUILD_VERSION,
          '--min-source-version', $env:LEGACY_BRIDGE_VERSION
        )
        if (Test-Path '.\artifacts\existing-catalog.json') {
          $builderArgs += @('--existing-catalog', '.\artifacts\existing-catalog.json')
          Write-Host "Passing existing catalog for merge."
        }
        if ($env:PREV_VERSION -and (Test-Path $env:PREV_STANDALONE_DIR)) {
          $builderArgs += @('--prev-source-dir', $env:PREV_STANDALONE_DIR, '--prev-version', $env:PREV_VERSION)
          Write-Host "Passing previous version $env:PREV_VERSION for step package generation."
        }
        dotnet run --project .\TelegramSearchBot.UpdateBuilder\TelegramSearchBot.UpdateBuilder.csproj `
          -c Release `
          --no-build `
          -- @builderArgs
        Copy-Item .\moder-update-bin\moder_update_updater.exe .\artifacts\update-feed\moder_update_updater.exe -Force
        Copy-Item .\moder-update-bin\moder_update_updater.exe .\artifacts\standalone\moder_update_updater.exe -Force
        $catalogPath = '.\artifacts\update-feed\catalog.json'
        $catalog = Get-Content $catalogPath -Raw | ConvertFrom-Json
        $catalog | Add-Member -NotePropertyName UpdaterChecksum -NotePropertyValue ((Get-FileHash .\artifacts\update-feed\moder_update_updater.exe -Algorithm SHA512).Hash.ToLower()) -Force
        $catalog | ConvertTo-Json -Depth 10 | Set-Content $catalogPath -Encoding utf8
    - name: Package full release asset
      shell: pwsh
      env:
        BUILD_VERSION: ${{ needs.prepare.outputs.build-version }}
      run: |
        $releaseDir = '.\artifacts\release'
        if (Test-Path $releaseDir) {
          Remove-Item $releaseDir -Recurse -Force
        }
        New-Item -ItemType Directory -Path $releaseDir | Out-Null
        $packageName = "TelegramSearchBot-win-x64-full-$env:BUILD_VERSION.zip"
        $packagePath = Join-Path $releaseDir $packageName
        Compress-Archive -Path .\artifacts\standalone\* -DestinationPath $packagePath -CompressionLevel Optimal
        $hashPath = "$packagePath.sha512"
        $hash = (Get-FileHash $packagePath -Algorithm SHA512).Hash.ToLower()
        Set-Content -Path $hashPath -Value "$hash  $packageName" -Encoding ascii
    - name: Upload update feed artifact
      uses: actions/upload-artifact@v4
      with:
        name: update-feed
        path: artifacts\update-feed
        if-no-files-found: error
    - name: Upload full release artifact
      uses: actions/upload-artifact@v4
      with:
        name: full-release
        path: artifacts\release
        if-no-files-found: error

  build-legacy-bridge:
    needs:
    - prepare
    - build-telegram-bot-api
    if: needs.prepare.outputs.publish-bridge == 'true'
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v1.1
    - name: Download telegram-bot-api artifact
      uses: actions/download-artifact@v4
      with:
        name: telegram-bot-api-bin
        path: telegram-bot-api-bin
    - name: Copy telegram-bot-api binary to project
      shell: pwsh
      run: |
        Copy-Item "telegram-bot-api-bin\telegram-bot-api.exe" "TelegramSearchBot\telegram-bot-api.exe" -Force
    - name: Clear NuGet cache
      run: dotnet nuget locals all --clear
    - name: Publish legacy ClickOnce bridge
      shell: pwsh
      run: |
        $content = 'TelegramSearchBot/Properties/PublishProfiles/ClickOnceProfile.pubxml'
        $xmldata = [xml](Get-Content $content)
        $node = $xmldata.Project.PropertyGroup
        $node.ApplicationVersion = $env:LEGACY_BRIDGE_VERSION
        $node.MinimumRequiredVersion = $env:LEGACY_BRIDGE_VERSION
        $xmldata.Save($content)
        msbuild TelegramSearchBot /restore /t:DoPublish /p:Configuration=Release /p:PublishProfile=ClickOnceProfile /p:RuntimeIdentifier=win-x64 /p:SelfContained=true /p:Version=$env:LEGACY_BRIDGE_VERSION
        $bridgeDir = '.\artifacts\legacy-bridge'
        if (Test-Path $bridgeDir) {
          Remove-Item $bridgeDir -Recurse -Force
        }
        New-Item -ItemType Directory -Path $bridgeDir | Out-Null
        Copy-Item .\TelegramSearchBot\bin\TelegramSearchBot\* $bridgeDir -Recurse -Force
        Set-Content -Path (Join-Path $bridgeDir $env:LEGACY_BRIDGE_MARKER) -Value $env:LEGACY_BRIDGE_VERSION -Encoding utf8
    - name: Upload legacy bridge artifact
      uses: actions/upload-artifact@v4
      with:
        name: legacy-bridge
        path: artifacts\legacy-bridge
        if-no-files-found: error

  publish-release:
    needs:
    - prepare
    - validate
    - build-standalone-assets
    - build-legacy-bridge
    if: ${{ always() && needs.prepare.result == 'success' && needs.validate.result == 'success' && needs.build-standalone-assets.result == 'success' && (needs.build-legacy-bridge.result == 'success' || needs.build-legacy-bridge.result == 'skipped') }}
    runs-on: windows-latest

    steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Download update feed artifact
      uses: actions/download-artifact@v4
      with:
        name: update-feed
        path: artifacts\update-feed
    - name: Download full release artifact
      uses: actions/download-artifact@v4
      with:
        name: full-release
        path: artifacts\release
    - name: Download legacy bridge artifact
      if: needs.prepare.outputs.publish-bridge == 'true'
      uses: actions/download-artifact@v4
      with:
        name: legacy-bridge
        path: artifacts\legacy-bridge
    - name: Upload release artifacts
      shell: pwsh
      env:
        B2_BUCKET: ${{ secrets.B2_BUCKET }}
        B2_APPKEY_ID: ${{ secrets.B2_APPKEY_ID }}
        B2_APPKEY: ${{ secrets.B2_APPKEY }}
      run: |
        function Get-B2Versions {
          param(
            [Parameter(Mandatory = $true)]
            [string]$B2Uri,
            [switch]$Recursive
          )

          $arguments = @('ls', '--json', '--versions')
          if ($Recursive) {
            $arguments += '--recursive'
          }
          $arguments += $B2Uri

          $output = & b2 @arguments 2>&1
          if ($LASTEXITCODE -ne 0) {
            return @()
          }

          $raw = ($output | Out-String).Trim()
          if ([string]::IsNullOrWhiteSpace($raw)) {
            return @()
          }

          return @($raw | ConvertFrom-Json)
        }

        function Remove-B2VersionById {
          param(
            [Parameter(Mandatory = $true)]
            [string]$FileId
          )

          & b2 rm --no-progress "b2id://$FileId" | Out-Null
        }

        function Prune-B2FileVersions {
          param(
            [Parameter(Mandatory = $true)]
            [string]$RelativePath,
            [int]$KeepLatest = 1
          )

          $uri = "b2://$env:B2_BUCKET/$RelativePath"
          $items = @(Get-B2Versions -B2Uri $uri)
          if ($items.Count -le $KeepLatest) {
            return
          }

          $staleItems = $items | Sort-Object uploadTimestamp -Descending | Select-Object -Skip $KeepLatest
          foreach ($item in $staleItems) {
            Remove-B2VersionById -FileId $item.fileId
          }
        }

        function Prune-B2PackagesByCatalog {
          param(
            [Parameter(Mandatory = $true)]
            [string]$CatalogPath
          )

          if (!(Test-Path $CatalogPath)) {
            Write-Host "Catalog not found, skipping reachability prune."
            return
          }

          $catalog = Get-Content $CatalogPath -Raw | ConvertFrom-Json
          $reachablePaths = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
          foreach ($entry in $catalog.Entries) {
            if ($entry.PackagePath) {
              $normalized = $entry.PackagePath -replace '^packages/', ''
              [void]$reachablePaths.Add("TelegramSearchBot/packages/$normalized")
            }
          }
          Write-Host "Catalog has $($catalog.Entries.Count) entries, $($reachablePaths.Count) reachable package paths."

          $items = @(Get-B2Versions -B2Uri "b2://$env:B2_BUCKET/TelegramSearchBot/packages/" -Recursive)
          if ($items.Count -eq 0) { return }

          foreach ($group in ($items | Group-Object fileName)) {
            $sortedItems = $group.Group | Sort-Object uploadTimestamp -Descending
            if ($reachablePaths.Contains($group.Name)) {
              $sortedItems = $sortedItems | Select-Object -Skip 1
            }
            foreach ($item in $sortedItems) {
              Remove-B2VersionById -FileId $item.fileId
            }
          }
        }

        pip install --quiet --cache-dir C:\pip-cache "b2==$env:B2_CLI_VERSION"
        b2 account authorize $env:B2_APPKEY_ID $env:B2_APPKEY --quiet
        if ($LASTEXITCODE -ne 0) {
          throw "b2 account authorize failed with exit code $LASTEXITCODE."
        }

        if ("${{ needs.prepare.outputs.publish-bridge }}" -eq "true") {
          $bridgeRoot = (Resolve-Path .\artifacts\legacy-bridge).Path
          b2 sync .\artifacts\legacy-bridge b2://$env:B2_BUCKET/TelegramSearchBot --quiet
          Get-ChildItem $bridgeRoot -File -Recurse | ForEach-Object {
            $relativePath = [System.IO.Path]::GetRelativePath($bridgeRoot, $_.FullName).Replace('\', '/')
            Prune-B2FileVersions -RelativePath "TelegramSearchBot/$relativePath"
          }
        }

        b2 sync .\artifacts\update-feed\packages b2://$env:B2_BUCKET/TelegramSearchBot/packages --quiet
        b2 upload-file $env:B2_BUCKET .\artifacts\update-feed\moder_update_updater.exe TelegramSearchBot/moder_update_updater.exe
        b2 upload-file $env:B2_BUCKET .\artifacts\update-feed\catalog.json TelegramSearchBot/catalog.json

        Prune-B2PackagesByCatalog -CatalogPath '.\artifacts\update-feed\catalog.json'
        Prune-B2FileVersions -RelativePath 'TelegramSearchBot/moder_update_updater.exe'
        Prune-B2FileVersions -RelativePath 'TelegramSearchBot/catalog.json'
        b2 account clear
    - name: Publish full package to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.release-tag }}
        target_commitish: ${{ github.sha }}
        name: Release ${{ needs.prepare.outputs.build-version }}
        generate_release_notes: true
        fail_on_unmatched_files: true
        overwrite_files: true
        files: |
          artifacts/release/*
